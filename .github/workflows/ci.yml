name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: thinkstack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run Prisma DB Push
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/thinkstack_test?sslmode=disable
      - name: Run Type Check & Lint
        run: |
          npm run check
          npm run lint
      - name: Run Vitest Unit & Integration Tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/thinkstack_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          ACCESS_TOKEN_SECRET: test-access-secret-test-access-secret-test-access-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret-test-refresh-secret-test-refresh-secret
          EMAIL_USER: test@example.com
          EMAIL_PASS: testpass
          GROQ_API_KEY: mock-groq-key
          CLOUDINARY_CLOUD_NAME: mock-cloud
          CLOUDINARY_API_KEY: mock-key
          CLOUDINARY_API_SECRET: mock-secret
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E Tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/thinkstack_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          ACCESS_TOKEN_SECRET: test-access-secret-test-access-secret-test-access-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret-test-refresh-secret-test-refresh-secret
          EMAIL_USER: test@example.com
          EMAIL_PASS: testpass
          GROQ_API_KEY: mock-groq-key
          CLOUDINARY_CLOUD_NAME: mock-cloud
          CLOUDINARY_API_KEY: mock-key
          CLOUDINARY_API_SECRET: mock-secret
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
